seed: 42
device: mps
run_dir: checkpoints/orchestrator_cartpole_local_light
num_ctx_tokens: 16
rollout_horizon: 3
reasoning_steps: 4
replay_capacity: 3000
surprise_bonus_weight: 0.10
surprise_replay_alpha: 0.5
fasttrack_return_threshold: 0.5
fasttrack_surprise_threshold: 0.35
router_top_k: 2

family_backbones:
  state_vector_hjepa:
    encoder_type: vit_tiny_patch16_224
    embed_dim: 192
    predictor_depth: 2
    predictor_num_heads: 3
    predictor_mlp_ratio: 2.0
    num_hierarchies: 2
    sequence_mode: true
    use_vq: false

memory:
  max_episodes: 256
  retrieval_k: 2
  device: cpu
  use_iob: true
  iob_dim: 64
  iob_widths: [16, 32, 64]
  retrieval_train_interval: 8

procedural:
  use_faiss: false
  use_lancedb: false
  use_csr: true
  csr_dim: 128
  csr_active_dims: 16
  use_isotropic_storage: true
  num_tokens: 8
  codebook_size: 64
  lora_rank: 4

sleep:
  interval_steps: 32

logging:
  representation_loss: hjepa
  num_candidates: 6
  path_length: 3

domains:
  - name: cartpole
    family: state_vector_hjepa
    bootstrap_random_episodes: 200
    bootstrap_teacher_episodes: 0
    bootstrap_simple_episodes: 0
    bootstrap_pretrain_steps: 250
    bootstrap_replay_warmup_steps: 200
    bootstrap_batch_size: 16
    mask_ratio: 0.1
    max_episode_steps: 256
    optimizer_interval: 1
    sleep_interval_episodes: 9999
    checkpoint_interval_episodes: 25
    evaluation_episodes: 20
    planner_backend: mcts
    world_model_backend: mamba
    baselines: [random]
    mcts_simulations: 16
    mcts_depth: 3
    mcts_rollout_horizon: 3
    mcts_use_baseline_guard: false
    primary_metric: episode_reward_mean
    primary_mode: max
    phases:
      core_control:
        episodes: 150
        use_memory: true
        use_sleep: true
        train_hjepa: true
        behavior_cloning_weight: 0.75
        exploration_epsilon_start: 0.5
        exploration_epsilon_end: 0.05
