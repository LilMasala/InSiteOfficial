seed: 42
device: cpu
run_dir: checkpoints/orchestrator_smoke
num_ctx_tokens: 4
rollout_horizon: 2
reasoning_steps: 1
replay_capacity: 2048

family_backbones:
  state_vector_hjepa:
    encoder_type: vit_tiny_patch16_224
    embed_dim: 192
    predictor_depth: 2
    predictor_num_heads: 3
    predictor_mlp_ratio: 2.0
    num_hierarchies: 2
    sequence_mode: true
    use_vq: false
  board_token_hjepa:
    encoder_type: vit_tiny_patch16_224
    embed_dim: 192
    predictor_depth: 2
    predictor_num_heads: 3
    predictor_mlp_ratio: 2.0
    num_hierarchies: 2
    sequence_mode: true
    use_vq: false

memory:
  max_episodes: 4096
  retrieval_k: 4
  device: cpu
  use_iob: true
  iob_dim: 96
  iob_widths: [24, 48, 96]
  retrieval_train_interval: 4

procedural:
  use_faiss: false
  use_lancedb: true
  use_csr: true
  csr_dim: 256
  csr_active_dims: 32
  use_isotropic_storage: true
  num_tokens: 8
  codebook_size: 64
  lora_rank: 8

sleep:
  interval_steps: 8

logging:
  representation_loss: hjepa
  num_candidates: 4
  path_length: 2

domains:
  - name: cartpole
    family: state_vector_hjepa
    bootstrap_random_episodes: 4
    bootstrap_pretrain_steps: 8
    bootstrap_batch_size: 4
    mask_ratio: 0.25
    max_episode_steps: 64
    optimizer_interval: 1
    sleep_interval_episodes: 8
    checkpoint_interval_episodes: 8
    evaluation_episodes: 4
    planner_backend: mcts
    world_model_backend: mamba
    baselines: [random]
    mcts_simulations: 8
    mcts_depth: 2
    mcts_rollout_horizon: 2
    primary_metric: episode_reward_mean
    primary_mode: max
    phases:
      core_control:
        episodes: 8
        use_memory: false
        use_sleep: false
        train_hjepa: false
      episodic_memory:
        episodes: 8
        use_memory: true
        use_sleep: false
        train_hjepa: false
      sleep:
        episodes: 8
        use_memory: true
        use_sleep: true
        train_hjepa: false

  - name: connect4
    family: board_token_hjepa
    bootstrap_random_episodes: 4
    bootstrap_pretrain_steps: 8
    bootstrap_batch_size: 4
    mask_ratio: 0.25
    max_episode_steps: 32
    optimizer_interval: 1
    sleep_interval_episodes: 8
    checkpoint_interval_episodes: 8
    evaluation_episodes: 4
    planner_backend: mcts
    world_model_backend: mamba
    baselines: [random, greedy]
    mcts_simulations: 8
    mcts_depth: 2
    mcts_rollout_horizon: 2
    primary_metric: win_rate
    primary_mode: max
    parity_threshold: 0.55
    memory_gain_threshold: 0.0
    phases:
      core_control:
        episodes: 8
        use_memory: false
        use_sleep: false
        train_hjepa: false
      episodic_memory:
        episodes: 8
        use_memory: true
        use_sleep: false
        train_hjepa: false
      sleep:
        episodes: 8
        use_memory: true
        use_sleep: true
        train_hjepa: false
