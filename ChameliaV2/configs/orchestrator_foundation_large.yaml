seed: 42
device: cuda
run_dir: checkpoints/orchestrator_foundation_large
embed_dim: 128
num_ctx_tokens: 8
rollout_horizon: 3
reasoning_steps: 2
replay_capacity: 100000

family_backbones:
  state_vector_hjepa:
    encoder_type: vit_tiny_patch16_224
    embed_dim: 192
    predictor_depth: 3
    predictor_num_heads: 3
    predictor_mlp_ratio: 2.0
    num_hierarchies: 3
    sequence_mode: true
    use_vq: true
    vq_codebook_size: 256
  board_token_hjepa:
    encoder_type: vit_tiny_patch16_224
    embed_dim: 192
    predictor_depth: 3
    predictor_num_heads: 3
    predictor_mlp_ratio: 2.0
    num_hierarchies: 3
    sequence_mode: true
    use_vq: true
    vq_codebook_size: 256

memory:
  max_episodes: 50000
  retrieval_k: 8
  device: cpu
  use_iob: true
  iob_dim: 128
  iob_widths: [32, 64, 128]
  retrieval_train_interval: 8

procedural:
  use_faiss: false
  use_lancedb: true
  use_csr: true
  csr_dim: 512
  csr_active_dims: 48
  use_isotropic_storage: true
  num_tokens: 16
  codebook_size: 128
  lora_rank: 8

sleep:
  interval_steps: 32

logging:
  representation_loss: combined
  num_candidates: 6
  path_length: 3

domains:
  - name: cartpole
    family: state_vector_hjepa
    bootstrap_random_episodes: 128
    bootstrap_pretrain_steps: 512
    bootstrap_batch_size: 32
    mask_ratio: 0.25
    max_episode_steps: 256
    optimizer_interval: 1
    retrieval_refresh_episodes: 100
    sleep_interval_episodes: 500
    checkpoint_interval_episodes: 500
    evaluation_episodes: 64
    planner_backend: mcts
    world_model_backend: mamba
    baselines: [random]
    mcts_simulations: 16
    mcts_depth: 3
    mcts_rollout_horizon: 3
    primary_metric: episode_reward_mean
    primary_mode: max
    parity_threshold: 200.0
    phases:
      core_control:
        episodes: 1000
        use_memory: false
        use_sleep: false
        train_hjepa: false
      episodic_memory:
        episodes: 1000
        use_memory: true
        use_sleep: false
        train_hjepa: false
      sleep:
        episodes: 3000
        use_memory: true
        use_sleep: true
        train_hjepa: false

  - name: connect4
    family: board_token_hjepa
    bootstrap_random_episodes: 256
    bootstrap_pretrain_steps: 768
    bootstrap_batch_size: 64
    mask_ratio: 0.3
    max_episode_steps: 64
    optimizer_interval: 1
    retrieval_refresh_episodes: 250
    sleep_interval_episodes: 1000
    checkpoint_interval_episodes: 1000
    evaluation_episodes: 64
    planner_backend: mcts
    world_model_backend: mamba
    baselines: [random, greedy]
    mcts_simulations: 32
    mcts_depth: 4
    mcts_rollout_horizon: 3
    primary_metric: win_rate
    primary_mode: max
    parity_threshold: 0.6
    memory_gain_threshold: 0.02
    phases:
      core_control:
        episodes: 2000
        use_memory: false
        use_sleep: false
        train_hjepa: false
      episodic_memory:
        episodes: 2000
        use_memory: true
        use_sleep: false
        train_hjepa: false
      sleep:
        episodes: 6000
        use_memory: true
        use_sleep: true
        train_hjepa: false
